<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credit Card Approval Prediction</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <div class="header">
        <h1>Credit Card Approval Prediction</h1>
        <p>Enter the applicant details below</p>
    </div>

    <form action="/predict" method="POST">

        <div class="row">

            <div class="input-box">
                <label>Applicant Name</label>
                <input type="text" name="name" placeholder="Enter Applicant Name" required>
            </div>

            <div class="input-box">
                <label>Gender</label>
                <select name="gender" required>
                    <option value="">Select</option>
                    <option value="1">Male</option>
                    <option value="0">Female</option>
                </select>
            </div>

        </div>

        <div class="row">

            <div class="input-box">
                <label>Own Car</label>
                <select name="car" required>
                    <option value="">Select</option>
                    <option value="1">Yes</option>
                    <option value="0">No</option>
                </select>
            </div>

            <div class="input-box">
                <label>Own House</label>
                <select name="house" required>
                    <option value="">Select</option>
                    <option value="1">Yes</option>
                    <option value="0">No</option>
                </select>
            </div>

        </div>

        <div class="row">

            <div class="input-box">
                <label>Number of Children</label>
                <input type="number" name="children" min="0" required>
            </div>

            <div class="input-box">
                <label>Family Members</label>
                <input type="number" name="family" min="1" required>
            </div>

        </div>

        <div class="row">

            <div class="input-box">
                <label>Annual Income (₹)</label>
                <input type="number" name="income" required>
            </div>

            <div class="input-box">
                <label>Age</label>
                <input type="number" name="age" min="18" max="100" required>
            </div>

        </div>

        <div class="row">

            <div class="input-box">
                <label>Years Employed</label>
                <input type="number" name="experience" min="0" required>
            </div>

            <div class="input-box">
                <label>Income Type</label>
                <select name="income_type" required>
                    <option value="4">Working</option>
                    <option value="0">Commercial Associate</option>
                    <option value="2">Pensioner</option>
                    <option value="3">State Servant</option>
                    <option value="1">Student</option>
                </select>
            </div>

        </div>

        <div class="row">

            <div class="input-box">
                <label>Education</label>
                <select name="education" required>
                    <option value="1">Higher Education</option>
                    <option value="4">Secondary</option>
                    <option value="2">Incomplete Higher</option>
                    <option value="3">Lower Secondary</option>
                    <option value="0">Academic Degree</option>
                </select>
            </div>

            <div class="input-box">
                <label>Family Status</label>
                <select name="family_status" required>
                    <option value="1">Married</option>
                    <option value="3">Single</option>
                    <option value="0">Civil Marriage</option>
                    <option value="4">Widow</option>
                    <option value="2">Separated</option>
                </select>
            </div>

        </div>

        <div class="row">

            <div class="input-box">
                <label>Housing Type</label>
                <select name="housing" required>
                    <option value="1">House / Apartment</option>
                    <option value="4">Rented Apartment</option>
                    <option value="2">Municipal Apartment</option>
                    <option value="5">Office Apartment</option>
                    <option value="0">Co-op Apartment</option>
                    <option value="3">With Parents</option>
                </select>
            </div>

            <div class="input-box">
                <label>Occupation</label>
                <select name="occupation" required>
                    <option value="0">Accountant</option>
                    <option value="4">Driver</option>
                    <option value="8">Laborer</option>
                    <option value="10">Manager</option>
                    <option value="14">Sales Staff</option>
                    <option value="16">Security Staff</option>
                    <option value="17">Unknown</option>
                </select>
            </div>

        </div>

        <div class="row">

            <div class="input-box">
                <label>Mobile Phone</label>
                <select name="mobile" required>
                    <option value="1">Yes</option>
                    <option value="0">No</option>
                </select>
            </div>

            <div class="input-box">
                <label>Work Phone</label>
                <select name="work_phone" required>
                    <option value="1">Yes</option>
                    <option value="0">No</option>
                </select>
            </div>

        </div>

        <div class="row">

            <div class="input-box">
                <label>Phone</label>
                <select name="phone" required>
                    <option value="1">Yes</option>
                    <option value="0">No</option>
                </select>
            </div>

            <div class="input-box">
                <label>Email</label>
                <select name="email" required>
                    <option value="1">Yes</option>
                    <option value="0">No</option>
                </select>
            </div>

        </div>

        <button type="submit">
            Predict Eligibility
        </button>

    </form>

</div>

</body>
</html>
